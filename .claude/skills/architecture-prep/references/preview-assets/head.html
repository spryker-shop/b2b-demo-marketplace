<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Architecture — arc42</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root{--fg:#1a1a1a;--bg:#fff;--muted:#586069;--line:#e1e4e8;--link:#1558b0;--sidebar:#f6f8fa;--code:#f3f4f6;}
  @media (prefers-color-scheme:dark){:root{--fg:#e6edf3;--bg:#0d1117;--muted:#9aa7b4;--line:#232b34;--link:#58a6ff;--sidebar:#111722;--code:#161b22;}}
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;color:var(--fg);background:var(--bg);}
  #layout{display:flex;align-items:flex-start;}
  #sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;width:280px;flex:0 0 280px;background:var(--sidebar);border-right:1px solid var(--line);padding:20px 16px;}
  #sidebar h2{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:16px 0 8px;}
  #sidebar a{display:block;padding:3px 8px;color:var(--fg);text-decoration:none;border-radius:5px;font-size:14px;}
  #sidebar a:hover{background:var(--code);}
  #content{flex:1 1 auto;max-width:960px;padding:32px 48px 120px;margin:0 auto;}
  .section{border-bottom:1px solid var(--line);padding-bottom:24px;margin-bottom:24px;scroll-margin-top:12px;}
  h1{font-size:1.9em;border-bottom:2px solid var(--line);padding-bottom:.3em;}
  h2{font-size:1.4em;margin-top:1.4em;} h3{font-size:1.15em;}
  table{border-collapse:collapse;width:100%;margin:1em 0;display:block;overflow-x:auto;}
  th,td{border:1px solid var(--line);padding:6px 10px;text-align:left;vertical-align:top;font-size:14px;}
  th{background:var(--code);}
  code{background:var(--code);padding:.15em .35em;border-radius:4px;font-size:.9em;}
  pre code{display:block;padding:12px;overflow-x:auto;}
  a{color:var(--link);text-decoration:underline;}
  .mermaid{margin:18px 0;text-align:center;}
  blockquote{border-left:4px solid #d0a020;background:rgba(208,160,32,.08);margin:1em 0;padding:.5em 1em;}
  .banner{background:rgba(21,88,176,.08);border:1px solid var(--line);padding:10px 16px;border-radius:6px;margin-bottom:24px;font-size:14px;}
  .err{color:#b00;font-size:13px;border:1px dashed #b00;padding:10px;border-radius:6px;}
  @page{margin:14mm;}
  @media print{#sidebar{display:none;}#content{max-width:none;padding:0;}.banner{display:none;}
    a{color:#1558b0 !important;}.section{break-inside:auto;border-bottom:none;page-break-after:always;}
    .mermaid,svg,tr,img{break-inside:avoid;}}
</style>
</head>
<body>
<div id="layout">
  <nav id="sidebar"><h2>Contents</h2><div id="toc"></div></nav>
  <main id="content">
    <div class="banner" id="banner"></div>
    <div id="doc"><p style="color:var(--muted)">Loading…</p></div>
  </main>
</div>
