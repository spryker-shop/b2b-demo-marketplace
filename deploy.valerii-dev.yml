version: '0.1'

namespace: spryker_demo
tag: '1.0'

environment: docker.dev
image:
    tag: spryker/php:8.4
    php:
        enabled-extensions:
            - otel
            - amqp
    environment:
        SPRYKER_PRODUCT_CONFIGURATOR_HOST: date-time-configurator-example.valerii-dev.cloud.spryker.toys
        SPRYKER_PRODUCT_CONFIGURATOR_PORT: 80
        SPRYKER_PRODUCT_CONFIGURATOR_ENCRYPTION_KEY: 'change123'
        SPRYKER_PRODUCT_CONFIGURATOR_HEX_INITIALIZATION_VECTOR: '0c1ffefeebdab4a3d839d0e52590c9a2'
        SPRYKER_PUSH_NOTIFICATION_WEB_PUSH_PHP_VAPID_PUBLIC_KEY: 'BGqNWbv0hWM5CQ1-KwAfSQBMC6TMVFyrnh3vQp37oGCNvQ6eG_HyMjxBFJRWeCPTbzDoxcjhxLJS8Ck8r1G2oFw'
        SPRYKER_PUSH_NOTIFICATION_WEB_PUSH_PHP_VAPID_PRIVATE_KEY: 'UK6DywwjKITPpRHBSY9TLPIXm6BPrHX40sseIoXT9c8'
        SPRYKER_PUSH_NOTIFICATION_WEB_PUSH_PHP_VAPID_SUBJECT: 'https://spryker.com'
        SPRYKER_DYNAMIC_STORE_MODE: true
        SPRYKER_YVES_HOST_EU: yves.eu.valerii-dev.cloud.spryker.toys
    node:
        version: 24
        npm: 10
composer:
    mode: --no-dev
    autoload: --classmap-authoritative

assets:
    image: spryker/nginx-brotli:latest
    mode: production
    compression:
        brotli:
            static: on
            level: 5

regions:
    EU:
        services:
            mail:
                sender:
                    name: Spryker No-Reply
                    email: no-reply@valerii-dev.cloud.spryker.toys
            database:
                database: valerii_dev
                username: spryker
                password: secret

            broker:
                namespace: eu-docker
            key_value_store:
                namespace: 1
            search:
                namespace: eu_search
groups:
    EU:
        region: EU
        applications:
            mportal:
                application: merchant-portal
                endpoints:
                    mp.eu.valerii-dev.cloud.spryker.toys:
                        entry-point: MerchantPortal
                        region: EU
                        primal: true
                        services:
                            session:
                                namespace: 7
            yves:
                application: yves
                endpoints:
                    date-time-configurator-example.valerii-dev.cloud.spryker.toys:
                        entry-point: Configurator
                    yves.eu.valerii-dev.cloud.spryker.toys:
                        region: EU
                        services:
                            session:
                                namespace: 2
            glue:
                application: glue
                endpoints:
                    glue.eu.valerii-dev.cloud.spryker.toys:
                        region: EU
            boffice:
                application: backoffice
                endpoints:
                    backoffice.eu.valerii-dev.cloud.spryker.toys:
                        region: EU
                        services:
                            session:
                                namespace: 3
            backgw:
                application: backend-gateway
                endpoints:
                    backend-gateway.eu.valerii-dev.cloud.spryker.toys:
                        region: EU
                        primal: true
            gluestorefront:
                application: glue-storefront
                endpoints:
                    glue-storefront.eu.valerii-dev.cloud.spryker.toys:
                        region: EU
            gluebackend:
                application: glue-backend
                endpoints:
                    glue-backend.eu.valerii-dev.cloud.spryker.toys:
                        region: EU
services:
    database:
        engine: mysql
        version: mariadb-11.8
        root:
            username: 'root'
            password: 'secret'
        endpoints:
            localhost:3306:
                protocol: tcp
    broker:
        engine: rabbitmq
        version: '4.1'
        api:
            username: 'spryker'
            password: 'secret'
        endpoints:
            queue.valerii-dev.cloud.spryker.toys:
            localhost:5672:
                protocol: tcp
    session:
        engine: valkey
    key_value_store:
        engine: valkey
        endpoints:
            localhost:16379:
                protocol: tcp
    search:
        engine: opensearch
        version: '1.3'
        endpoints:
            localhost:9200:
                protocol: tcp
    scheduler:
        engine: jenkins
        version: '2.516.3'
        csrf-protection-enabled: false
        endpoints:
            scheduler.valerii-dev.cloud.spryker.toys:
    mail_catcher:
        engine: mailpit
        endpoints:
            mail.valerii-dev.cloud.spryker.toys:
    swagger:
        engine: swagger-ui
        endpoints:
            swagger.valerii-dev.cloud.spryker.toys:
    dashboard:
        engine: dashboard
        endpoints:
            valerii-dev.cloud.spryker.toys:
    webdriver:
        engine: chromedriver

docker:
    ssl:
        enabled: true
        redirect: true

    debug:
        enabled: false
        xdebug:
            enabled: false

    testing:
        store: EU

    mount:
        baked:
