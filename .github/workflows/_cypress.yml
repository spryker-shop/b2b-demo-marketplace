name: _cypress

on:
    workflow_call:

env:
    SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    WEEKLY_CI_SLACK_CHANNEL_ID: ${{ secrets.WEEKLY_CI_SLACK_CHANNEL_ID }}
    JIRA_TICKET_SLACK_USER_GROUP_MAPPING: ${{ secrets.JIRA_TICKET_SLACK_USER_GROUP_MAPPING }}
    ROBOT_TESTS_ARTIFACTS_BUCKET_REGION: eu-west-1

jobs:
    cypress-shards:
        name: "Cypress shard manifest"
        timeout-minutes: 8
        runs-on: ubuntu-latest
        outputs:
            shards: ${{ steps.compute.outputs.shards }}
        steps:
            -   uses: actions/checkout@v4

            -   uses: ramsey/composer-install@v3
                with:
                    composer-options: "-q --ignore-platform-reqs --no-interaction --prefer-install=auto"

            -   name: Verify shard manifest matches cypress-tests
                # Drift gate: fails this job RED (plain exit 1) so the signal is
                # unmissable. The dependent `cypress` matrix has `needs: cypress-shards`,
                # so on drift it is SKIPPED — saving CI minutes without grey-ing out the gate.
                run: .github/workflows/scripts/cypress-shard-drift-check.py

            -   id: compute
                name: Emit matrix from manifest
                run: |
                    SHARDS=$(python3 -c "
                    import json
                    with open('.github/workflows/cypress/shards.json') as f:
                        manifest = json.load(f)
                    total = len(manifest)
                    out = []
                    for k in sorted(manifest.keys(), key=int):
                        out.append({
                            'label': f'{k}/{total}',
                            'shard': int(k),
                            'total': total,
                            'specs': ','.join(manifest[k]),
                        })
                    print(json.dumps(out))
                    ")
                    echo "shards=${SHARDS}" >> "$GITHUB_OUTPUT"
                    echo "Computed Cypress shards: ${SHARDS}"

    cypress:
        name: "Cypress / UI ${{ matrix.repository_id }} ${{ matrix.shard.label }}"
        timeout-minutes: 60
        needs: cypress-shards
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                shard: ${{ fromJson(needs.cypress-shards.outputs.shards) }}
                repository_id: ['b2b-mp', 'b2b']
        env:
            PROGRESS_TYPE: plain
            SPRYKER_PLATFORM_IMAGE: spryker/php:8.4
            TRAVIS: 1
            ROBOT_TESTS_ARTIFACTS_BUCKET_REGION: eu-west-1
            SPRYKER_CURRENT_REGION: EU
            DYNAMIC_STORE_MODE: true
        steps:
            -   uses: actions/checkout@v4

            -   uses: ramsey/composer-install@v3
                with:
                    composer-options: "-q --ignore-platform-reqs --optimize-autoloader --no-interaction --prefer-install=auto"

            -   name: Set core spec list from manifest
                env:
                    SPECS: ${{ matrix.shard.specs }}
                run: |
                    n=$(awk -F, '{print NF}' <<<"$SPECS")
                    echo "CORE_SPECS=${SPECS}" >> "$GITHUB_ENV"
                    echo "🔀 CORE_SPECS ${{ matrix.repository_id }} shard ${{ matrix.shard.label }}: ${n} specs"

            -   name: Configure sysctl limits
                run: |
                    sudo sysctl -w vm.swappiness=10
                    sudo sysctl -w fs.file-max=262144
                    sudo sysctl -w vm.max_map_count=262144
                    ulimit -n 65536

            -   name: Uninstall marketplace modules (b2b variant)
                if: matrix.repository_id == 'b2b'
                run: |
                    chmod +x uninstall-marketplace-modules.sh
                    chmod +x uninstall-frontend-marketplace.sh
                    ./uninstall-frontend-marketplace.sh
                    ./uninstall-marketplace-modules.sh

            -   uses: actions/download-artifact@v6
                with:
                    name: spryker-app-db

            -   name: Run project in Docker
                # Build-once: restore the shared spryker-app-db dump (full_EU) instead of
                # importing demodata per shard. ci.restore-db.stage2 rebuilds the codebase in
                # the container and loads eu-docker.sql + publish/sync. Removes the per-shard
                # publish race that left store-storage incomplete (defaultLocaleIsoCode null ->
                # 500 in the StoreSwitcher widget); validate-sync-completeness makes any
                # remaining incompleteness a hard build failure rather than a flaky test.
                run: |
                    git clone https://github.com/spryker/docker-sdk.git ./docker && git -C ./docker fetch --depth 1 origin $(cat .git.docker) && git -C ./docker checkout $(cat .git.docker)
                    docker/sdk boot .github/deploy/deploy.ci.acceptance.mariadb.cypress.yml
                    sudo bash -c "echo '127.0.0.1 backend-api.eu.spryker.local backend-api.us.spryker.local backend-gateway.eu.spryker.local backend-gateway.us.spryker.local backoffice.eu.spryker.local backoffice.us.spryker.local glue-backend.eu.spryker.local glue-backend.us.spryker.local glue-storefront.eu.spryker.local glue-storefront.us.spryker.local glue.eu.spryker.local glue.us.spryker.local mail.spryker.local mp.eu.spryker.local mp.us.spryker.local queue.spryker.local spryker.local swagger.spryker.local yves.eu.spryker.local yves.us.spryker.local' >> /etc/hosts"
                    SPRYKER_PIPELINE=ci.restore-db.stage2 docker/sdk up -t
                    docker/sdk cli composer dump-autoload -o -a --apcu -q

            -   name: Validate sync completeness
                uses: ./.github/actions/validate-sync-completeness

            -   name: Install Cypress
                run: |
                    docker/sdk exec cypress-tests cp .env.dynamic-store.example .env
                    docker/sdk exec cypress-tests git log -3
                    docker/sdk exec cypress-tests npx cypress install

            -   name: Run Tests (Core)
                id: run_tests
                continue-on-error: true
                if: env.CORE_SPECS != ''
                # retries=2: a test that passes on retry is a flake (shard goes green,
                # cypress logs it as "flaky"); one that fails all retries is a real
                # failure (shard stays red). Classifies sharding-exposed flakes vs hard
                # failures — mirrors robot-ui's rerun-failed pass.
                run: |
                    docker/sdk exec --env "ENV_REPOSITORY_ID=${{ matrix.repository_id }}" --env "ENV_IS_SSP_ENABLED=true" cypress-tests \
                        npx cypress run --headless --browser chrome --config retries=2 --spec "$CORE_SPECS"

            -   name: Upload Screenshots
                if: steps.run_tests.outcome == 'failure'
                run: |
                    AWS_DEFAULT_REGION=${{env.ROBOT_TESTS_ARTIFACTS_BUCKET_REGION}} AWS_ACCESS_KEY_ID=${{ secrets.ROBOT_TESTS_ARTIFACTS_KEY }} AWS_SECRET_ACCESS_KEY=${{ secrets.ROBOT_TESTS_ARTIFACTS_SECRET }} aws s3 cp .cypress s3://${{vars.ROBOT_TESTS_ARTIFACTS_BUCKET}}/${{ matrix.repository_id }}/dms-on/cypress/${GITHUB_RUN_ID}/PHP8.4MariaDB/core/shard-${{ matrix.shard.shard }}-of-${{ matrix.shard.total }}/ --recursive

            -   name: Generate Cypress Test Summary
                if: always() && steps.run_tests.outcome == 'failure'
                run: |
                    python3 tests/cypress-tests/generate_failure_summary.py .cypress > /tmp/cypress-summary.md 2>/dev/null || true
                    cat /tmp/cypress-summary.md >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

            -   name: Save PHP logs
                if: steps.run_tests.outcome == 'failure'
                run: |
                    mkdir -p logs
                    docker logs spryker_ci_backoffice_eu_1 > logs/backoffice_app.log 2>&1
                    docker logs spryker_ci_glue_eu_1 > logs/glue_app.log 2>&1
                    docker logs spryker_ci_yves_eu_1 > logs/yves_app.log 2>&1
                    docker logs spryker_ci_merchant_portal_eu_1 > logs/merchant_portal_app.log 2>&1
                    docker logs spryker_ci_glue_backend_eu_1 > logs/glue_backend_eu.log 2>&1 || true
                    echo "PHP logs saved. After upload, they will be available as 'cypress-ui-failed-artifacts-${{ matrix.repository_id }}-shard-${{ matrix.shard.shard }}-of-${{ matrix.shard.total }}'"

            -   name: Upload PHP logs
                if: steps.run_tests.outcome == 'failure'
                uses: actions/upload-artifact@v5
                with:
                    name: cypress-ui-failed-artifacts-${{ matrix.repository_id }}-shard-${{ matrix.shard.shard }}-of-${{ matrix.shard.total }}
                    retention-days: 5
                    path: |
                        logs/*.log
                        .cypress/

            -   name: Output test results
                if: always()
                run: |
                    CORE="${{ steps.run_tests.outcome }}"
                    echo "Shard ${{ matrix.repository_id }} ${{ matrix.shard.label }} — Core: ${CORE:-skipped}"
                    if [[ "${CORE}" == "failure" ]]; then
                        echo "❌ Core tests failed for ${{ matrix.repository_id }} shard ${{ matrix.shard.label }}."
                        exit 1
                    fi
                    echo "Shard passed."
                    exit 0

            -   name: Slack Notification for failed job
                uses: ./.github/actions/job-slack-notifications
                if: always()

    cypress-ssp:
        name: "Cypress / UI SSP"
        timeout-minutes: 60
        runs-on: ubuntu-latest
        env:
            PROGRESS_TYPE: plain
            SPRYKER_PLATFORM_IMAGE: spryker/php:8.4
            TRAVIS: 1
            ROBOT_TESTS_ARTIFACTS_BUCKET_REGION: eu-west-1
            SPRYKER_CURRENT_REGION: EU
            DYNAMIC_STORE_MODE: true
        steps:
            -   uses: actions/checkout@v4

            -   uses: ramsey/composer-install@v3
                with:
                    composer-options: "-q --ignore-platform-reqs --optimize-autoloader --no-interaction --prefer-install=auto"

            -   name: Configure sysctl limits
                run: |
                    sudo sysctl -w vm.swappiness=10
                    sudo sysctl -w fs.file-max=262144
                    sudo sysctl -w vm.max_map_count=262144
                    ulimit -n 65536

            -   uses: actions/download-artifact@v6
                with:
                    name: spryker-app-db

            -   name: Run project in Docker
                # Build-once: restore the shared spryker-app-db dump (full_EU) instead of
                # importing demodata per shard. ci.restore-db.stage2 rebuilds the codebase in
                # the container and loads eu-docker.sql + publish/sync. Removes the per-shard
                # publish race that left store-storage incomplete (defaultLocaleIsoCode null ->
                # 500 in the StoreSwitcher widget); validate-sync-completeness makes any
                # remaining incompleteness a hard build failure rather than a flaky test.
                run: |
                    git clone https://github.com/spryker/docker-sdk.git ./docker && git -C ./docker fetch --depth 1 origin $(cat .git.docker) && git -C ./docker checkout $(cat .git.docker)
                    docker/sdk boot .github/deploy/deploy.ci.acceptance.mariadb.cypress.yml
                    sudo bash -c "echo '127.0.0.1 backend-api.eu.spryker.local backend-api.us.spryker.local backend-gateway.eu.spryker.local backend-gateway.us.spryker.local backoffice.eu.spryker.local backoffice.us.spryker.local glue-backend.eu.spryker.local glue-backend.us.spryker.local glue-storefront.eu.spryker.local glue-storefront.us.spryker.local glue.eu.spryker.local glue.us.spryker.local mail.spryker.local mp.eu.spryker.local mp.us.spryker.local queue.spryker.local spryker.local swagger.spryker.local yves.eu.spryker.local yves.us.spryker.local' >> /etc/hosts"
                    SPRYKER_PIPELINE=ci.restore-db.stage2 docker/sdk up -t
                    docker/sdk cli composer dump-autoload -o -a --apcu -q

            -   name: Validate sync completeness
                uses: ./.github/actions/validate-sync-completeness

            -   name: Install Cypress
                run: |
                    docker/sdk exec cypress-tests cp .env.dynamic-store.example .env
                    docker/sdk exec cypress-tests npx cypress install

            -   name: Run Tests (SSP)
                id: run_ssp_tests
                continue-on-error: true
                run: |
                    docker/sdk exec --env "ENV_REPOSITORY_ID=b2b-mp" --env "ENV_IS_SSP_ENABLED=true" cypress-tests npm run cy:ci:ssp

            -   name: Upload Screenshots (SSP)
                if: steps.run_ssp_tests.outcome == 'failure'
                run: |
                    AWS_DEFAULT_REGION=${{env.ROBOT_TESTS_ARTIFACTS_BUCKET_REGION}} AWS_ACCESS_KEY_ID=${{ secrets.ROBOT_TESTS_ARTIFACTS_KEY }} AWS_SECRET_ACCESS_KEY=${{ secrets.ROBOT_TESTS_ARTIFACTS_SECRET }} aws s3 cp .cypress s3://${{vars.ROBOT_TESTS_ARTIFACTS_BUCKET}}/b2b-mp/dms-on/cypress/${GITHUB_RUN_ID}/PHP8.4MariaDB/ssp/ --recursive

            -   name: Generate Cypress Test Summary
                if: always() && steps.run_ssp_tests.outcome == 'failure'
                run: |
                    python3 tests/cypress-tests/generate_failure_summary.py .cypress > /tmp/cypress-summary.md 2>/dev/null || true
                    cat /tmp/cypress-summary.md >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

            -   name: Save PHP logs
                if: steps.run_ssp_tests.outcome == 'failure'
                run: |
                    mkdir -p logs
                    docker logs spryker_ci_backoffice_eu_1 > logs/backoffice_app.log 2>&1
                    docker logs spryker_ci_glue_eu_1 > logs/glue_app.log 2>&1
                    docker logs spryker_ci_yves_eu_1 > logs/yves_app.log 2>&1
                    docker logs spryker_ci_merchant_portal_eu_1 > logs/merchant_portal_app.log 2>&1
                    docker logs spryker_ci_glue_backend_eu_1 > logs/glue_backend_eu.log 2>&1 || true
                    echo "PHP logs saved. After upload, they will be available as 'cypress-ui-failed-artifacts-ssp'"

            -   name: Upload PHP logs
                if: steps.run_ssp_tests.outcome == 'failure'
                uses: actions/upload-artifact@v5
                with:
                    name: cypress-ui-failed-artifacts-ssp
                    retention-days: 5
                    path: |
                        logs/*.log
                        .cypress/

            -   name: Output test results
                if: always()
                run: |
                    SSP="${{ steps.run_ssp_tests.outcome }}"
                    echo "SSP: ${SSP:-skipped}"
                    if [[ "${SSP}" == "failure" ]]; then
                        echo "❌ SSP tests failed."
                        exit 1
                    fi
                    echo "SSP tests passed."
                    exit 0

            -   name: Slack Notification for failed job
                uses: ./.github/actions/job-slack-notifications
                if: always()
