name: _codeception

on:
    workflow_call:

env:
    SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    WEEKLY_CI_SLACK_CHANNEL_ID: ${{ secrets.WEEKLY_CI_SLACK_CHANNEL_ID }}
    JIRA_TICKET_SLACK_USER_GROUP_MAPPING: ${{ secrets.JIRA_TICKET_SLACK_USER_GROUP_MAPPING }}

jobs:
    acceptance-api:
        name: "Codeception / Acceptance & API"
        runs-on: ubuntu-latest
        env:
            PROGRESS_TYPE: plain
            SPRYKER_PLATFORM_IMAGE: spryker/php:8.4
            TRAVIS: 1
            SPRYKER_CURRENT_REGION: EU
            DYNAMIC_STORE_MODE: true

        steps:
            -   uses: actions/checkout@v4

            -   uses: ramsey/composer-install@v3
                with:
                    composer-options: "-q --ignore-platform-reqs --optimize-autoloader --no-interaction --prefer-install=auto"

            -   name: Configure sysctl limits
                run: |
                    sudo sysctl -w vm.swappiness=10
                    sudo sysctl -w fs.file-max=262144
                    sudo sysctl -w vm.max_map_count=262144
                    ulimit -n 65536

            -   uses: actions/download-artifact@v6
                with:
                    name: spryker-app-db

            -   name: Run docker
                # Build-once: restore the shared spryker-app-db dump (full_EU) via
                # ci.restore-db.stage2 instead of importing demodata. codecept fixtures still
                # runs afterwards (mirrors suite) to build test-specific fixtures on top.
                run: |
                    git clone https://github.com/spryker/docker-sdk.git ./docker && git -C ./docker fetch --depth 1 origin $(cat .git.docker) && git -C ./docker checkout $(cat .git.docker)
                    docker/sdk boot .github/deploy/deploy.ci.acceptance.mariadb.yml
                    SPRYKER_PIPELINE=ci.restore-db.stage2 docker/sdk up -t

            -   name: Validate sync completeness
                uses: ./.github/actions/validate-sync-completeness

            -   name: Run Fixtures
                run: |
                    docker/sdk testing codecept fixtures
                    docker/sdk testing composer dump-autoload -o -a --apcu -q
                    echo "console queue:worker:start --stop-when-empty"
                    docker/sdk testing console queue:worker:start --stop-when-empty

            -   name: Run Acceptance Tests
                id: acceptance-tests
                run: |
                    docker/sdk testing codecept run -c tests/codeception.acceptance.yml

            -   name: Run API Tests
                id: api-tests
                run: |
                    docker/sdk testing codecept run -c tests/codeception.api.yml

            -   name: Save PHP logs
                if: always() && (steps.api-tests.outcome == 'failure' || steps.acceptance-tests.outcome == 'failure')
                run: |
                    mkdir -p logs
                    docker logs spryker_ci_backoffice_eu_1 > logs/backoffice_app.log 2>&1
                    docker logs spryker_ci_glue_eu_1 > logs/glue_app.log 2>&1
                    docker logs spryker_ci_yves_eu_1 > logs/yves_app.log 2>&1
                    docker logs spryker_ci_merchant_portal_eu_1 > logs/merchant_portal_app.log 2>&1
                    echo "PHP logs saved. After upload, they will be available in GitHub Actions Artifacts as 'codeception-failed-artifacts'"

            -   name: Upload logs, failed screenshots and HTML
                if: always() && (steps.api-tests.outcome == 'failure' || steps.acceptance-tests.outcome == 'failure')
                uses: actions/upload-artifact@v5
                with:
                    name: codeception-failed-artifacts
                    retention-days: 5 # save for 5 days
                    path: |
                        logs/*.log
                        tests/**/_output/**/*
                        src/Spryker/**/tests/_output/*

            -   name: Slack Notification for failed job
                uses: ./.github/actions/job-slack-notifications
                if: always()

    functional:
        name: "Codeception / Functional Tests"
        runs-on: ubuntu-latest
        env:
            PROGRESS_TYPE: plain
            SPRYKER_PLATFORM_IMAGE: spryker/php:8.4
            TRAVIS: 1
            SPRYKER_CURRENT_REGION: EU
            DYNAMIC_STORE_MODE: true
            COMPOSER_IGNORE_CHROMEDRIVER: 1

        steps:
            -   uses: actions/checkout@v4

            -   uses: ramsey/composer-install@v3
                with:
                    composer-options: "-q --ignore-platform-reqs --optimize-autoloader --no-interaction --prefer-install=auto"

            -   uses: actions/download-artifact@v6
                with:
                    name: spryker-app-db

            -   name: Run docker
                # Build-once: restore the shared spryker-app-db dump (full_EU) via
                # ci.restore-db.stage2 instead of importing demodata (functional pipeline
                # docker.ci.api.full also imports full_EU). No validate-sync gate here —
                # mirrors suite's functional job, which doesn't depend on ES/Redis storage.
                run: |
                    git clone https://github.com/spryker/docker-sdk.git ./docker && git -C ./docker fetch --depth 1 origin $(cat .git.docker) && git -C ./docker checkout $(cat .git.docker)
                    docker/sdk boot .github/deploy/deploy.ci.functional.mariadb.yml -a --apcu
                    SPRYKER_PIPELINE=ci.restore-db.stage2 docker/sdk up -t
                    docker/sdk cli composer dump-autoload -o -a --apcu -q

            -   name: Run Tests
                run: docker/sdk testing codecept run -c tests/codeception.ci.functional.yml

            -   name: Slack Notification for failed job
                uses: ./.github/actions/job-slack-notifications
                if: always()
