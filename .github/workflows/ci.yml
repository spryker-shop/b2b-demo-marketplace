name: B2B-MP-CI

on:
    pull_request:
        types: [opened, synchronize, reopened, ready_for_review]
    push:
        branches:
            - master
    # MERGE SAFETY (FRW-11570): full suite re-runs per merge attempt — the real "all jobs executed" gate.
    # On merge_group events the draft-tiering if: evaluates to "run everything" (not a pull_request event).
    # Requires the master ruleset to require the merge queue + the status checks (applied separately by an admin).
    merge_group:
    workflow_dispatch:

env:
    SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    WEEKLY_CI_SLACK_CHANNEL_ID: ${{ secrets.WEEKLY_CI_SLACK_CHANNEL_ID }}
    JIRA_TICKET_SLACK_USER_GROUP_MAPPING: ${{ secrets.JIRA_TICKET_SLACK_USER_GROUP_MAPPING }}

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    scan-credentials:
        name: "Scan for Credentials"
        if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/master') }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Run TruffleHog OSS
              uses: trufflesecurity/trufflehog@v3.90.8
              with:
                  extra_args: --log-level=2 --results=verified
    validation:
        name: "Static analysis"
        if: ${{ !(github.event_name == 'push' && github.ref == 'refs/heads/master') }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-version: [
                    '8.3',
                    '8.4'
                ]

        env:
            APPLICATION_ENV: ci.mysql
            APPLICATION_STORE: DE
            PROJECT: suite
            SPRYKER_CURRENT_REGION: EU
            COMPOSER_IGNORE_CHROMEDRIVER: 1

        steps:
            -   uses: actions/checkout@v4

            -   uses: ramsey/composer-install@v3
                with:
                    composer-options: "-q --ignore-platform-reqs --optimize-autoloader --no-interaction --prefer-install=auto"

            -   name: Generate transfer objects
                run: vendor/bin/console transfer:generate

            -   name: Generate transfer databuilder objects
                run: vendor/bin/console transfer:databuilder:generate

            -   name: Propel install
                run: |
                    vendor/bin/console propel:schema:copy
                    vendor/bin/console propel:model:build
                    vendor/bin/console transfer:entity:generate

            -   name: Codecept build
                run: vendor/bin/codecept build -q

            -   name: Generate autocompletion files
                run: vendor/bin/console dev:ide-auto-completion:generate

            -   name: Setup search map files
                run: vendor/bin/console search:setup:source-map

            -   name: Validate propel files
                run: |
                    vendor/bin/console propel:schema:validate
                    vendor/bin/console propel:schema:validate-xml-names

            -   name: Validate transfer files
                run: vendor/bin/console transfer:validate

            -   name: Run CodeStyle checks
                run: vendor/bin/console code:sniff:style

            -   name: Run Architecture rules
                run: vendor/bin/phpmd src/ text vendor/spryker/architecture-sniffer/src/ruleset.xml --minimumpriority 2

            -   name: Generate rest API documentation
                run: vendor/bin/console rest-api:generate:documentation

            -  name: Generate API
               run: |
                   echo "vendor/bin/glue api:generate" && vendor/bin/glue api:generate --quiet-meta --keep-existing
                   echo "GLUE_APPLICATION=GLUE_BACKEND vendor/bin/glue api:generate" && GLUE_APPLICATION=GLUE_BACKEND vendor/bin/glue api:generate --quiet-meta --keep-existing

            -   name: Run PHPStan
                run: vendor/bin/phpstan analyze -l 6 -c phpstan.neon src/

            -   name: Run Evaluator for release branches
                run: vendor/bin/evaluator evaluate --format=compact
                if: github.event.pull_request.base.ref == 'master' && startsWith(github.event.pull_request.head.ref, 'release-')

            -   name: Run Evaluator for all branches
                run: vendor/bin/evaluator evaluate --exclude-checkers=SPRYKER_DEV_PACKAGES_CHECKER --format=compact

            -   uses: actions/setup-node@v4
                with:
                    node-version: '24'

            -   name: Install NPM packages
                run: |
                    sudo npm i --location=global --unsafe-perm speccy@0.11.0

            -   name: Speccy lint Glue specification
                run: speccy lint src/Generated/Glue/Specification/spryker_rest_api.schema.yml --rules=default --skip openapi-tags

            -   name: Slack Notification for failed job
                uses: ./.github/actions/job-slack-notifications
                if: always()

    js-validation:
        name: "NPM validation"
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v5
                with:
                    node-version: '24'
                    cache: 'npm'

            -   name: Install NPM packages
                run: npm ci

            -   name: Style lint
                run: npm run yves:stylelint

            -   name: ES lint
                run: npm run yves:lint

            -   name: Front-end Formatter
                run: npm run formatter

            -   name: Front-end MP Lint
                run: npm run mp:lint

            -   name: Front-end MP Style lint
                run: npm run mp:stylelint

            -   name: Front-end MP Unit Tests
                run: npm run mp:test

            -   name: Slack Notification for failed job
                uses: ./.github/actions/job-slack-notifications
                if: always()

    # BUILD-ONCE (CC-39284): build the EU dump once; codeception + cypress restore it.
    # Not draft-tiered — codeception always runs, so its build-db dependency must too.
    build-db:
        needs: [js-validation]
        uses: ./.github/workflows/_build-db.yml
        secrets: inherit

    # BUILD-ONCE (CC-39284): build the ROBOT dump once; robot-api + robot-ui restore it.
    # Draft-tiered to match the robot consumers — no point building it when they skip.
    build-robot-db:
        needs: [js-validation, validation]
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        uses: ./.github/workflows/_build-robot-db.yml
        secrets: inherit

    codeception:
        needs: [js-validation, validation, build-db]
        uses: ./.github/workflows/_codeception.yml
        secrets: inherit

    robot-api:
        needs: [validation, build-robot-db]
        # DRAFT_TIERING (FRW-11570): E2E tier skipped on draft PRs; runs on ready_for_review.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        uses: ./.github/workflows/_robot-api.yml
        secrets: inherit

    robot-ui:
        needs: [js-validation, validation, build-robot-db]
        # DRAFT_TIERING (FRW-11570): E2E tier skipped on draft PRs; runs on ready_for_review.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        uses: ./.github/workflows/_robot-ui.yml
        secrets: inherit

    cypress:
        needs: [js-validation, validation, build-db]
        # DRAFT_TIERING (FRW-11570): E2E tier skipped on draft PRs; runs on ready_for_review.
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
        uses: ./.github/workflows/_cypress.yml
        secrets: inherit
