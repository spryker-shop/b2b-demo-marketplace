name: B2B-MP-CI-FOCUSED

on:
    workflow_dispatch:
        inputs:
            framework:
                description: "Which framework to run (and only that). robot-api / cypress run both their mp + b2b variants."
                required: true
                type: choice
                options:
                    - codeception
                    - robot-api
                    - robot-ui
                    - cypress

concurrency:
    # Include the framework so concurrent focused runs on the same branch don't cancel each other
    # (a re-dispatch of the SAME framework still cancels its own in-flight run).
    group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.framework }}
    cancel-in-progress: true

# NOTE: b2b's reusable workflows are self-installing (each job boots its own env), so there are no
# build-db / build-frontend deps to gate here, and no `narrow` sub-framework input yet — that arrives
# in Phase 2 once the reusable workflows are parameterized for sharding.
jobs:
    codeception:
        if: ${{ inputs.framework == 'codeception' }}
        uses: ./.github/workflows/_codeception.yml
        secrets: inherit

    robot-api:
        if: ${{ inputs.framework == 'robot-api' }}
        uses: ./.github/workflows/_robot-api.yml
        secrets: inherit

    robot-ui:
        if: ${{ inputs.framework == 'robot-ui' }}
        uses: ./.github/workflows/_robot-ui.yml
        secrets: inherit

    cypress:
        if: ${{ inputs.framework == 'cypress' }}
        uses: ./.github/workflows/_cypress.yml
        secrets: inherit
