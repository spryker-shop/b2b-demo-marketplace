# yaml-language-server: $schema=../../../../Spryker/Configuration/resources/configuration/configuration-schema-v1.json
features:
    - key: theme
      name: Theme
      description: Visual branding settings for Storefront, Back Office, and Merchant Portal
      enabled: true
      order: 10
      tabs:
          - key: storefront
            name: Storefront
            icon: storefront
            description: Storefront theme colors and custom CSS
            order: 2
            enabled: true
            groups:
                - key: colors
                  name: Storefront Colors
                  scopes:
                      - global
                      - store
                  enabled: true
                  settings:
                      - key: background_brand_primary
                        name: Brand Primary
                        description: Main brand color for primary buttons and key actions
                        type: color
                        default_value: '#318272'
                        scopes:
                            - global
                            - store
                        enabled: true
                        secret: false
                        storefront: true
                        constraints:
                            - type: regex
                              message: 'Must be a valid hex color (e.g. #ff0000)'
                              options:
                                  pattern: '^#[0-9A-Fa-f]{6}$'

                      - key: background_brand_hover
                        name: Brand Hover
                        description: Brand color on hover state
                        type: color
                        default_value: '#226558'
                        scopes:
                            - global
                            - store
                        enabled: true
                        secret: false
                        storefront: true
                        constraints:
                            - type: regex
                              message: 'Must be a valid hex color (e.g. #ff0000)'
                              options:
                                  pattern: '^#[0-9A-Fa-f]{6}$'

                      - key: background_brand_pressed
                        name: Brand Pressed
                        description: Brand color on active/pressed state
                        type: color
                        default_value: '#15483e'
                        scopes:
                            - global
                            - store
                        enabled: true
                        secret: false
                        storefront: true
                        constraints:
                            - type: regex
                              message: 'Must be a valid hex color (e.g. #ff0000)'
                              options:
                                  pattern: '^#[0-9A-Fa-f]{6}$'

                      - key: background_brand_subtle
                        name: Brand Subtle
                        description: Light tinted brand background for tags, badges, and highlights
                        type: color
                        default_value: '#f3fffc'
                        scopes:
                            - global
                            - store
                        enabled: true
                        secret: false
                        storefront: true
                        constraints:
                            - type: regex
                              message: 'Must be a valid hex color (e.g. #ff0000)'
                              options:
                                  pattern: '^#[0-9A-Fa-f]{6}$'

                      - key: background_accent_primary
                        name: Accent Primary
                        description: Main accent color for secondary actions and highlights
                        type: color
                        default_value: '#469189'
                        scopes:
                            - global
                            - store
