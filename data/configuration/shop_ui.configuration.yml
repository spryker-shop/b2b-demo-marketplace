                        secret: false
                        storefront: true
                        constraints:
                            - type: regex
                              message: 'Must be a valid hex color (e.g. #ff0000)'
                              options:
                                  pattern: '^#[0-9A-Fa-f]{6}$'

                      - key: background_accent_hover
                        name: Accent Hover
